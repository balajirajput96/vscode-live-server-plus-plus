name: AI Career Automation Workflow

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    # Run daily at 9 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      webhook_trigger:
        description: 'Trigger n8n webhook'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '20.x'

jobs:
  automation-setup:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: 'Checkout Repository'
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 'Install Dependencies'
      run: |
        npm ci
        cd career-automation-system && npm install --package-lock-only || echo "No package.json in career-automation-system"
        cd ../portfolio-automation-system && npm install --package-lock-only || echo "No package.json in portfolio-automation-system"

    - name: 'Build Project'
      run: |
        npm run compile
        echo "Build completed successfully"

    - name: 'Validate Environment Variables'
      run: |
        echo "Checking required environment variables..."
        if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
          echo "⚠️  OPENAI_API_KEY not set"
        else
          echo "✅ OPENAI_API_KEY is configured"
        fi
        
        if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "⚠️  GEMINI_API_KEY not set"
        else
          echo "✅ GEMINI_API_KEY is configured"
        fi
        
        if [ -z "${{ secrets.N8N_WEBHOOK_URL }}" ]; then
          echo "⚠️  N8N_WEBHOOK_URL not set"
        else
          echo "✅ N8N_WEBHOOK_URL is configured"
        fi

    - name: 'Run AI Career Automation'
      if: success()
      run: |
        echo "🤖 Running AI Career Automation System..."
        node automation-script.js

    - name: 'Update Social Media Templates'
      if: success()
      run: |
        echo "✅ Social media templates updated by automation script"

    - name: 'Trigger n8n Webhook'
      if: success() && (github.event.inputs.webhook_trigger == 'true' || github.event_name == 'schedule')
      run: |
        echo "✅ n8n webhook handled by automation script"

    - name: 'Deploy to Azure Functions'
      if: success() && secrets.AZURE_PUBLISH_PROFILE
      uses: Azure/functions-action@v1
      with:
        app-name: '${{ vars.AZURE_FUNCTIONAPP_NAME || 'vscode-live-server-automation' }}'
        package: '.'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}

    - name: 'Generate Analytics Report'
      if: success()
      run: |
        echo "✅ Analytics report generated by automation script"
        if [ -f "automation-analytics.json" ]; then
          echo "📊 Analytics Summary:"
          cat automation-analytics.json
        fi

    - name: 'Commit Automation Updates'
      if: success() && github.event_name != 'pull_request'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if [[ -n $(git status --porcelain) ]]; then
          git add -A
          git commit -m "🤖 Automated updates: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "✅ Automated updates committed and pushed"
        else
          echo "No changes to commit"
        fi

  notification:
    needs: automation-setup
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 'Send Completion Notification'
      run: |
        if [ "${{ needs.automation-setup.result }}" = "success" ]; then
          echo "🎉 Automation workflow completed successfully!"
          echo "✅ Portfolio updated"
          echo "✅ Social media templates refreshed"
          echo "✅ System ready for next automation cycle"
        else
          echo "❌ Automation workflow failed"
          echo "Please check the logs and ensure all secrets are configured"
        fi
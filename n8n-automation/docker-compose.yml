version: '3.8'

services:
  n8n:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: n8n-career-automation
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Basic n8n configuration
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      
      # Webhook configuration
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_TRUST_PROXY=true
      
      # Timezone configuration
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - TZ=${TIMEZONE:-Asia/Kolkata}
      
      # Security and limits
      - N8N_PAYLOAD_SIZE_MAX=16MB
      - N8N_METRICS=true
      
      # Database (using SQLite for simplicity)
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      
      # Execution settings
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=3600
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_MAX_AGE=336
      
      # Email configuration (optional)
      - N8N_EMAIL_MODE=${EMAIL_MODE:-smtp}
      - N8N_SMTP_HOST=${SMTP_HOST:-}
      - N8N_SMTP_PORT=${SMTP_PORT:-587}
      - N8N_SMTP_USER=${SMTP_USER:-}
      - N8N_SMTP_PASS=${SMTP_PASS:-}
      
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows:ro
      - ./scripts:/home/node/scripts:ro
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Reverse proxy with Nginx for HTTPS
  nginx:
    image: nginx:alpine
    container_name: n8n-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - n8n
    networks:
      - n8n-network
    profiles:
      - proxy

  # Optional: Tunnel service for external access
  ngrok:
    image: ngrok/ngrok:latest
    container_name: n8n-tunnel
    restart: unless-stopped
    command: 
      - "tunnel"
      - "--label"
      - "edge=edghts_2G..."  # Replace with your edge label
      - "http://n8n:5678"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - n8n
    networks:
      - n8n-network
    profiles:
      - tunnel

volumes:
  n8n_data:
    driver: local

networks:
  n8n-network:
    driver: bridge
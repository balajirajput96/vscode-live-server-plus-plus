version: '3.8'

services:
  # Caddy reverse proxy for SSL termination
  caddy:
    image: caddy:2.7-alpine
    container_name: n8n-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - n8n-network
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation-prod
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      # Basic Configuration
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      
      # Domain & Security (Production)
      - N8N_HOST=${DOMAIN}
      - WEBHOOK_URL=https://${DOMAIN}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_SECURE_COOKIE=true
      - N8N_TRUST_PROXY=true
      - N8N_PROTOCOL=https
      
      # Performance Settings
      - N8N_HIGH_PERFORMANCE=${N8N_HIGH_PERFORMANCE}
      - N8N_CACHE_ENABLED=${N8N_CACHE_ENABLED}
      - N8N_PARALLEL_EXECUTION=${N8N_PARALLEL_EXECUTION}
      - N8N_EXECUTION_TIMEOUT=${N8N_EXECUTION_TIMEOUT}
      - N8N_MAX_EXECUTION_TIMEOUT=${N8N_MAX_EXECUTION_TIMEOUT}
      
      # Database (PostgreSQL for production)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
      
      # Redis for caching
      - N8N_CACHE_REDIS=true
      - N8N_CACHE_REDIS_HOST=redis
      - N8N_CACHE_REDIS_PORT=6379
      - N8N_CACHE_REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Logging
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL}
      - N8N_LOG_FILE_ENABLED=${N8N_LOG_FILE_ENABLED}
      - N8N_LOG_FILE_LOCATION=${N8N_LOG_FILE_LOCATION}
      
      # Metrics
      - N8N_METRICS=${N8N_METRICS}
      - N8N_METRICS_PREFIX=${N8N_METRICS_PREFIX}
      
      # Features
      - N8N_TEMPLATES_ENABLED=${N8N_TEMPLATES_ENABLED}
      - N8N_ONBOARDING_FLOW_DISABLED=${N8N_ONBOARDING_FLOW_DISABLED}
      - N8N_PERSONALIZATION_ENABLED=${N8N_PERSONALIZATION_ENABLED}
      
      # Timezone
      - TZ=${TZ}
      
      # Custom Environment Variables for Integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      
    volumes:
      # Main n8n data directory
      - n8n_data:/home/node/.n8n
      
      # Workflow templates
      - ./workflows:/home/node/.n8n/workflows
      
      # Custom nodes and scripts
      - ./scripts:/home/node/.n8n/scripts
      
      # AI models for local processing
      - ./ai-models:/home/node/.n8n/ai-models
      
      # Configuration files
      - ./configs:/home/node/.n8n/configs
      
      # Logs directory
      - ./logs:/home/node/.n8n/logs
      
      # Backups directory
      - ./backups:/home/node/.n8n/backups
      
    networks:
      - n8n-network
    
    depends_on:
      - postgres
      - redis
      - ollama
    
    # Resource limits for optimal performance
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Local AI service with Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ai-prod
    restart: unless-stopped
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
      - ./ai-models:/models
    networks:
      - n8n-network
    # GPU support (uncomment if you have GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Redis for caching and high performance
  redis:
    image: redis:7-alpine
    container_name: n8n-redis-prod
    restart: unless-stopped
    expose:
      - "6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - n8n-network
    command: redis-server --requirepass ${REDIS_PASSWORD}

  # PostgreSQL for production database
  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_POSTGRESDB_DATABASE}
      - POSTGRES_USER=${DB_POSTGRESDB_USER}
      - POSTGRES_PASSWORD=${DB_POSTGRESDB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - n8n-network
    expose:
      - "5432"

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: n8n-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - n8n-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # Grafana for dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: n8n-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - n8n-network

volumes:
  n8n_data:
    driver: local
  ollama_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  n8n-network:
    driver: bridge